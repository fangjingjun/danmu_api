name: Sync Upstream

on:
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
