name: Sync Upstream

on:
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push https://x-access-token:${{ secrets.PAT }}@github.com/fangjingjun/danmu_api.git main
